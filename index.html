<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rubik's Cube Pro | Vercel</title>
    <style>
        body { margin: 0; overflow: hidden; background: #0a0a0a; font-family: 'Segoe UI', sans-serif; }
        #ui {
            position: absolute; top: 20px; right: 20px; z-index: 10;
            display: flex; flex-direction: column; gap: 10px;
            background: rgba(0,0,0,0.6); padding: 15px; border-radius: 15px;
            backdrop-filter: blur(10px); border: 1px solid #333;
        }
        button {
            padding: 10px 20px; border: none; border-radius: 8px;
            background: #222; color: #00ffcc; cursor: pointer;
            font-weight: bold; transition: 0.3s; border: 1px solid #444;
        }
        button:hover { background: #00ffcc; color: #000; box-shadow: 0 0 15px #00ffcc; }
        .reset { color: #ff4444; border-color: #500; }
    </style>
</head>
<body>
    <div id="ui">
        <button onclick="window.rotateLayer('y', 1)">Upper (U)</button>
        <button onclick="window.rotateLayer('x', -1)">Left (L)</button>
        <button onclick="window.rotateLayer('z', 1)">Front (F)</button>
        <button class="reset" onclick="location.reload()">Reset</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module" src="main.js"></script>
</body>
</html>
